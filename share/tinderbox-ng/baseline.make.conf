# /etc/portage/make.conf -- shipped by tinderbox-ng bootstrap
#
# Conservative defaults tuned for a build-test rig. Edit per session
# from inside the chroot if you need to exercise a different toolchain
# configuration; overlayfs keeps the change scoped to that session's
# upper layer.

COMMON_FLAGS="-O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"

CHOST="x86_64-pc-linux-gnu"

# Pin LDFLAGS explicitly so we don't inherit the profile default that
# includes -Wl,-z,pack-relative-relocs. That flag triggers a
# `C compiler cannot create executables` mis-diagnosis from autoconf's
# conftest on a non-trivial subset of older ebuilds (the conftest links a
# tiny program with full LDFLAGS, the resulting binary fails to start
# under the baseline's loader, and configure concludes the toolchain is
# broken). Empirically responsible for ~40% of fail/fail compare rows in
# the matrix (sdcv, texlive-core, julius, most of dev-haskell/*, ...).
# If a session needs DT_RELR-packed relocs, opt in via package.env or
# /etc/portage/env/* — keep the baseline conservative.
LDFLAGS="-Wl,-O1 -Wl,--as-needed"

# Parallelism: tinderbox-ng substitutes @NPROC@ at bootstrap time. Portage's
# make.conf parser does not expand $(...) command substitution, so we cannot
# inline `$(nproc)` here.
MAKEOPTS="-j@NPROC@ -l@NPROC@"
# --usepkg=y consumes any matching binpkg in $PKGDIR before falling back to a
# source build. --binpkg-respect-use=y restricts that match to binpkgs whose
# stored USE equals the planner's resolved USE for the ebuild (after IUSE
# projection). FEATURES=buildpkg below ensures every successful source build
# adds back to the shared cache, so the next session reuses it. The pair makes
# the matrix self-amortizing: cold start rebuilds, every restart is faster.
EMERGE_DEFAULT_OPTS="--jobs=@NPROC@ --load-average=@NPROC@ --keep-going=y --quiet-build=y --usepkg=y --binpkg-respect-use=y"

# News writes mutate /var/lib/gentoo; suppress in baseline so sessions
# do not get nagged about news items they cannot meaningfully act on.
# parallel-fetch + userfetch let downloads happen as the portage user.
# buildpkg leaves binpkgs around in /var/cache/binpkgs (bind-mounted by
# tinderbox-ng if the host directory exists), so sessions can share them.
# ccache: not listed in FEATURES here — bootstrap_install_ccache (or
# `tinderbox-ng install-ccache`) adds it once dev-util/ccache is present.
# CCACHE_DIR below is inert until then. The directory is bind-mounted from
# $TINDERBOX_ROOT/shared/ccache so every session shares the same
# compile-output cache; max_size lives in /etc/ccache.conf and is set from
# $TINDERBOX_CCACHE_MAX_SIZE at install time (default 100G).
# -collision-protect: stage3 orphans (bc, cpio, …) must be claimed by
# app-alternatives/*; collision-protect treats those as fatal collisions.
# protect-owned: allow overwriting unowned paths (Gentoo default; explicit
# here so profile drift cannot re-enable collision-protect).
FEATURES="-news -candy parallel-fetch userfetch buildpkg sandbox usersandbox -collision-protect protect-owned"

PORTAGE_TMPDIR="/var/tmp"
PORTDIR_OVERLAY=""

DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"
CCACHE_DIR="/var/cache/ccache"

# For testing, accept any license. Real merge plans should pin this.
ACCEPT_LICENSE="*"

# Tinderbox accepts the unstable amd64 keyword so we can exercise every
# ebuild in the tree, not just the conservative stable subset. Per Portage
# semantics, accepting ~amd64 implicitly accepts the corresponding stable
# amd64 keyword as well, so this strictly expands the candidate version
# set rather than shifting it. Live (=9999, **-only) ebuilds remain
# excluded; if you need them, layer ACCEPT_KEYWORDS="**" via package.accept_keywords
# inside the session, not here.
ACCEPT_KEYWORDS="~amd64"

GENTOO_MIRRORS="https://distfiles.gentoo.org"

L10N="en"
LINGUAS="en"
LC_MESSAGES=C.utf8
