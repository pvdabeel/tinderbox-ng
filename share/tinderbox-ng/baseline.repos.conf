# /etc/portage/repos.conf/gentoo.conf -- shipped by tinderbox-ng bootstrap
#
# Points emerge at the bind-mounted Portage tree. tinderbox-ng mounts the
# host's pinned shared/portage-tree at /usr/portage so the Prolog config
# (Source/Config/vm-linux.local.pl, lines 19-22) and emerge agree on the
# same tree.

[DEFAULT]
main-repo = gentoo

[gentoo]
location = /usr/portage
sync-type = git
sync-uri = https://github.com/gentoo-mirror/gentoo.git
auto-sync = no
priority = -1000
